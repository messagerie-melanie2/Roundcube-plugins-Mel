<roundcube:include file="includes/layout.html" />
<roundcube:include file="includes/menu.html" />
<roundcube:include file="includes/settings-menu.html" />

<template id="su-custom-elements">
  <bnum-button data-icon="visibility" data-icon-margin="0" id="base-template-button"  class="p-0" title="<roundcube:label name="mel_resource.show_resource_title" />"></error-button>
</template>

<div id="layout-content" role="main">
  <div class="content">
    <!-- Titre principal -->
    <h1 class="resource-title mb-4">
      <roundcube:label name="mel_resource.vehicule" />
    </h1>

    <!-- Bloc dynamique -->
    <div id="resource-section">
      <div class="resource-header">
        <div class="col-12 mb-4">
          <h3 class="h5 mb-2">
            <roundcube:label name="mel_resource.title_search_vehicule" />
          </h3>
          <div class="row align-items-center">
            <div class="col-md-8 mb-2 mb-md-0">
              <div class="mel-add-resource-group">
                <input id="resource-input" class="form-control" type="text"
                  placeholder="<roundcube:label name='mel_resource.title_search_vehicule' />" value="">
                <button id="clear-button" class="btn-clear-input" type="button" title="<roundcube:label name='mel_resource.delete_field' />"
                  aria-label="<roundcube:label name='mel_resource.delete_field' />">✖</button>
              </div>
            </div>
            <div class="col-md-4">
              <primary-button data-icon="add_circle" id="resource-add-btn" aria-label="<roundcube:label name='mel_resource.create_vehicule_title' />"
                title="<roundcube:label name='mel_resource.create_vehicule_title' />">
                  <roundcube:label name="mel_resource.create_vehicule" />
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Tableau -->
      <div class="resources-list">
        <table class="resource-table table-striped table-bordered">
          <thead class="resource_striped">
            <tr>
              <th class="col-2"><roundcube:label name="mel_resource.vehicule_name" /></th>
              <th class="col-1 text-center"><roundcube:label name="mel_resource.resource_building" /></th>
              <th class="col-1 text-center"><roundcube:label name="mel_resource.locality" /></th>
              <th class="col-1 text-center"><roundcube:label name="mel_resource.resource_park" /></th>
              <th class="col-1 text-center"><roundcube:label name="mel_resource.resource_level" /></th>
              <th class="col-1 text-center"><roundcube:label name="mel_resource.resource_capacity" /></th>
              <th class="col-1 text-center"><roundcube:label name="mel_resource.show" /></th>
            </tr>
          </thead>
          <tbody id="resource-table-body">
            <!-- Lignes dynamiques ici -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<roundcube:include file="includes/footer.html" />
