<roundcube:include file="includes/layout.html" />
<roundcube:include file="includes/menu.html" />
<roundcube:include file="includes/settings-menu.html" />

<div id="layout-content" role="main">
  <div class="content">

    <!-- Titre principal -->
    <div class="row m-0 m-1">
      <div class="col-1 align-self-center">
        <secondary-button id="resource-back-btn" class="back" data-icon="arrow_left_alt" data-icon-pos="left">
          <roundcube:label name="mel_resource.back" />
        </secondary-button>
      </div>
    </div>
    <div class="row">
      <div class="col-12 text-center">
        <h1 class="resource-title mb-4 resource-create">
          <roundcube:label name="mel_resource.create_title" />
        </h1>
      </div>
    </div>

    <div class="formcontent">
      <form name="form" method="post" action="" class="cols-sm-6-6">
        <fieldset>
          <legend><roundcube:label name="mel_resource.vroom_info" /></legend>
          <table class="propform cols-sm-6-6">
            <tbody>
              <tr class="form-group row">
                <td class="title col-sm-6">
                  <label for="vroom_zoom_email" class="col-form-label"><roundcube:label name="mel_resource.resource_zoom_email" /></label>
                </td>
                <td class="col-sm-6">
                  <input type="text" class="form-control" name="vroom_zoom_email" value="" autofocus required >
                </td>
              </tr>
            </tbody>
          </table>
        </fieldset>
        <fieldset>
          <legend><roundcube:label name="mel_resource.vroom_room_info" /></legend>
          <table class="propform cols-sm-6-6">
            <tbody>
              <tr class="form-group row">
                <td class="title col-sm-6">
                  <label for="vroom_name" class="col-form-label"><roundcube:label name="mel_resource.vroom_name" /></label>
                </td>
                <td class="col-sm-6">
                  <input type="text" class="form-control" name="vroom_name" value="" required >
                </td>
              </tr>
              <tr class="form-group row">
                <td class="title col-sm-6">
                  <label for="vroom_building" class="col-form-label"><roundcube:label name="mel_resource.resource_building" /></label>
                </td>
                <td class="col-sm-6">
                  <roundcube:object name="vroom_building" />
                </td>
              </tr>
              <tr class="form-group row">
                <td class="title col-sm-6">
                  <label for="vroom_floor" class="col-form-label"><roundcube:label name="mel_resource.resource_floor" /></label>
                </td>
                <td class="col-sm-6">
                  <input type="text" class="form-control" name="vroom_floor" value="" required >
                </td>
              </tr>
              <tr class="form-group row">
                <td class="title col-sm-6">
                  <label for="vroom_room" class="col-form-label"><roundcube:label name="mel_resource.resource_room" /></label>
                </td>
                <td class="col-sm-6">
                  <input type="text" class="form-control" name="vroom_room" value="" required >
                </td>
              </tr>
              <tr class="form-group row">
                <td class="title col-sm-6">
                  <label for="vroom_capacity" class="col-form-label"><roundcube:label name="mel_resource.resource_capacity" /></label>
                </td>
                <td class="col-sm-6">
                  <roundcube:object name="vroom_capacity" />
                </td>
              </tr>
            </tbody>
          </table>
        </fieldset>
        <div class="form-controls">
          <input type="submit" class="mel-button no-margin-button no-button-margin" title="<roundcube:label name="mel_resource.save_title" />" value="<roundcube:label name="mel_resource.save" />" />
        </div>
      </form>
    </div>
  </div>
</div>

<roundcube:include file="includes/footer.html" />
