<roundcube:include file="includes/layout.html" />
<roundcube:include file="includes/menu.html" />

<h1 class="voice">
  <roundcube:label name="workspaces" />
</h1>

<div id="layout-content" class="wsp-content wsp-index only-content" role="main">
  <!-- <h2 id="aria-label-toolbar" class="voice"><roundcube:label name="arialabeltoolbar" /></h2>-->
  <div class="wsp-header">
    <div class="row">
      <div class="col-12 col-md-4 mb-3 mb-md-0 d-flex align-items-center justify-content-center justify-content-md-start">
        <span class="material-symbols-outlined colored-wsp-icon calendar_app only-current no-hover only-background">
          workspaces
          </span>
        <h2 class="font-weight-bold mb-0">
          <roundcube:label name="mel_workspace.my_workspaces" />
        </h2>
      </div>
      <div class="col-12 col-md-4 d-flex align-items-center justify-content-center">
        <div class="wsp-search-wsp">
          <div class="input-group mel-search-group mel-centered">
            <input id="wsp-search-input" type="text" onmousedown="" class="form-control mel-max-width-500"
              placeholder="Rechercher..." />
            <div class="input-group-append">
              <button class="mel-button no-margin-button no-button-margin reset-search disabled"
                style="padding: 0 5px;line-height: 1;" disabled
                title="Entrez un texte dans la recherche"><bnum-icon>search</bnum-icon></button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-4 d-flex align-items-center justify-content-center justify-content-md-end mt-3 mt-md-0">
        <button class="mel-button no-margin-button no-button-margin create-wsp-button">Créer un espace<bnum-icon
            class="plus" data-icon="add_circle"></bnum-icon></button>
      </div>
    </div>
  </div>

  <div class="body">
    <bnum-tabs id="main-pannel" data-navs="subscribed, publics, archived" data-ex-label="mel_workspace"
      data-description="Liste des différents espaces auquel on a souscris" data-shadow="false">
      <bnum-tab-container class="row my-3 align-items-center justify-content-center">
        <bnum-tab-receiver class="col-12 col-md-10"></bnum-tab-receiver>
        <div class="col-12 col-md-2 mt-3 mt-md-0 d-flex justify-content-md-end"><div class="btn-group pressed-list" role="group" aria-label="Mode d'affichage">
          <bnum-pressed-button id="mode-list"
            class="btn btn-secondary mel-button no-margin-button no-button-margin cannot-unpress">
            <bnum-icon>splitscreen</bnum-icon>
          </bnum-pressed-button>
          <bnum-pressed-button data-start-pressed="true" id="mode-block"
            class="btn btn-secondary mel-button no-margin-button no-button-margin cannot-unpress">
            <bnum-icon>grid_view</bnum-icon>
          </bnum-pressed-button>
        </div></div>
      </bnum-tab-container>
      <div data-linked-to="subscribed">
        <roundcube:object name="subscribed" />
      </div>

      <bnum-infinite-scroll-container data-scrollspace="workspace.publics"
        data-pagecount="<roundcube:object name=publiccount />" data-linked-to="publics">
        <roundcube:object name="publics" />
      </bnum-infinite-scroll-container>

      <div data-linked-to="archived">
        <roundcube:object name="archived" />
      </div>
      </bnum-tab>
  </div>
</div>

<roundcube:include file="includes/footer.html" />
